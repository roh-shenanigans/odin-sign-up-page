<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="left-sidebar">
        <div class="sidebar-heading">
            <img src="imgs/logo.png" class="logo">
            <div class="heading">ODIN</div>            
        </div>

        <div class="bg-img-credits">
            Photo by <a href="https://unsplash.com/@fakurian">Milad Fakurian
Milad Fakurian</a> on <a href="https://unsplash.com">Unsplash</a>
        </div>
    </div>

    <div class="right-content">
        <div class="top">

            <p class="text">
                This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams.
                Sign up <em>now</em> to get started.
                <br>
                <br>
                    You <em>know</em> you want to.
            </p>

        </div>

        <div class="middle">
            <p class="text">Let's do this!</p>

            <form action="#" method="post">

                <div class="first-row form-row">
                    <div class="first_name input">
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" id="first_name">
                    </div>
                    <div class="last_name input">
                        <label for="last_name">LAST NAME</label>
                        <input type="text" id="last_name">
                    </div>
                </div>

                <div class="second-row form-row">
                    <div class="email input">
                        <label for="email">EMAIL</label>
                        <input type="text" id="email" type="email">
                    </div>
                    <div class="phone_num input">
                        <label for="phone_num">PHONE NUMBER</label>
                        <input type="text" id="phone_num">
                    </div>
                </div>
                
                <div class="third-row form-row">
                    <div class="password input">
                            <label for="password">PASSWORD</label>
                            <input type="text" id="password">
                    </div>
                    <div class="confirm_password input">
                            <label for="confirm_password">CONFIRM PASSWORD</label>
                            <input type="text" id="confirm_password">
                    </div>
                </div>

            </form>
        </div>

        <div class="bottom">
            <button class="create-account"  onclick="window.location='https://www.youtube.com/watch?v=dQw4w9WgXcQ'">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </div>
</body>
</html>
